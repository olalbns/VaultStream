services:
  - type: web
    name: streamvault
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # ──────────────────────────────────────────────
      # Pour activer YouTube : colle ici tes cookies
      # exportés depuis un navigateur (format Netscape)
      # encodés en base64 :
      #   base64 -w0 youtube_cookies.txt
      # ──────────────────────────────────────────────
      # - key: YTDLP_COOKIE_DATA_B64
      #   value: "COLLE_ICI_LE_BASE64_DE_TES_COOKIES"
      #
      # Optionnel - clients YouTube à essayer en priorité:
      - key: YTDLP_YT_PLAYER_CLIENTS
        value: "android_vr,web_embedded,tv_simply,ios"