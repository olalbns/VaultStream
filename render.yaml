services:
  - type: web
    name: streamvault
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      python -m pip install --upgrade pip
      if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yt-dlp; fi
      if [ -f package.json ]; then npm install; else npm install --no-save puppeteer; fi
      npx puppeteer browsers install chrome
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 22.16.0
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"
